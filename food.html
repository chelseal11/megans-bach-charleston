<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Megan's Charleston Bach — Brunch</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap');

:root {
  --blush: #F2D1D1;
  --blush-light: #FDF0F0;
  --blush-dark: #E8A5A5;
  --gold: #D4A843;
  --gold-light: #F0DBA8;
  --gold-dark: #B8922F;
  --charcoal: #2D2D2D;
  --white: #FFFFFF;
  --cream: #FFF9F5;
  --sage: #B5C4B1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--cream);
  color: var(--charcoal);
  overflow: hidden;
  height: 100vh;
}

/* ─── TAB BAR ─── */
.tab-bar {
  display: flex; background: var(--charcoal);
}
.tab-bar a {
  flex: 1; text-align: center; padding: 10px 12px;
  font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 600;
  color: rgba(255,255,255,0.6); text-decoration: none;
  letter-spacing: 0.5px; transition: all 0.2s;
  border-bottom: 3px solid transparent;
}
.tab-bar a:hover { color: white; }
.tab-bar a.active { color: white; border-bottom-color: var(--gold); }

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, var(--blush) 0%, var(--blush-light) 50%, var(--gold-light) 100%);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--gold);
  z-index: 1000;
  position: relative;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--charcoal);
  letter-spacing: 1px;
}
.header h1 span { color: var(--gold-dark); }
.header-actions { display: flex; gap: 10px; align-items: center; }
.header-btn {
  background: var(--gold);
  color: var(--white);
  border: none;
  padding: 8px 16px;
  border-radius: 20px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.header-btn:hover { background: var(--gold-dark); transform: translateY(-1px); }
.header-btn.outline {
  background: transparent;
  border: 2px solid var(--gold);
  color: var(--gold-dark);
}
.header-btn.outline:hover { background: var(--gold); color: var(--white); }

/* ─── MAIN LAYOUT ─── */
.main {
  display: flex;
  height: calc(100vh - 58px - 39px);
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: 420px;
  min-width: 420px;
  overflow-y: auto;
  background: var(--cream);
  border-right: 1px solid var(--blush);
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--blush-dark) transparent;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--blush-dark); border-radius: 3px; }

.sidebar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--gold-dark);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--gold-light);
}

/* ─── SORT BAR ─── */
.sort-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.sort-label {
  font-size: 0.7rem;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 2px;
}
.sort-btn {
  background: var(--blush-light);
  border: 1px solid var(--blush);
  color: var(--charcoal);
  padding: 4px 10px;
  border-radius: 14px;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.sort-btn:hover { background: var(--blush); }
.sort-btn.active {
  background: var(--gold);
  color: var(--white);
  border-color: var(--gold);
}

/* ─── CATEGORY BADGE ─── */
.category-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  margin: 4px 0;
}
.category-badge.boat {
  background: linear-gradient(135deg, #E0F2FE, #BAE6FD);
  color: #0369A1;
  border: 1px solid #7DD3FC;
}
.category-badge.food {
  background: linear-gradient(135deg, #FEF3C7, #FDE68A);
  color: #92400E;
  border: 1px solid #FCD34D;
}
.category-badge.nightlife {
  background: linear-gradient(135deg, #EDE9FE, #DDD6FE);
  color: #5B21B6;
  border: 1px solid #C4B5FD;
}
.category-badge.wellness {
  background: linear-gradient(135deg, #ECFDF5, #A7F3D0);
  color: #065F46;
  border: 1px solid #6EE7B7;
}
.category-badge.tour {
  background: linear-gradient(135deg, #FFF7ED, #FED7AA);
  color: #9A3412;
  border: 1px solid #FDBA74;
}
.category-badge.class {
  background: linear-gradient(135deg, #FDF2F8, #FBCFE8);
  color: #9D174D;
  border: 1px solid #F9A8D4;
}
.category-badge.beach {
  background: linear-gradient(135deg, #F0FDFA, #99F6E4);
  color: #115E59;
  border: 1px solid #5EEAD4;
}
.category-badge.brunch {
  background: linear-gradient(135deg, #FFFBEB, #FDE68A);
  color: #78350F;
  border: 1px solid #FCD34D;
}
.category-badge.hike {
  background: linear-gradient(135deg, #F0FDF4, #BBF7D0);
  color: #166534;
  border: 1px solid #86EFAC;
}
.category-badge.fun {
  background: linear-gradient(135deg, #FFF1F2, #FECDD3);
  color: #9F1239;
  border: 1px solid #FDA4AF;
}
.category-badge.dinner {
  background: linear-gradient(135deg, #FDF4FF, #F5D0FE);
  color: #7E22CE;
  border: 1px solid #E9A8FF;
}

/* ─── LISTING CARD ─── */
.card {
  background: var(--white);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border: 1px solid var(--blush);
  transition: all 0.25s;
  cursor: pointer;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,168,67,0.15); border-color: var(--gold-light); }
.card.active { border: 2px solid var(--gold); box-shadow: 0 6px 20px rgba(212,168,67,0.25); }

.card-rank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  background: var(--gold);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  border-radius: 50%;
  flex-shrink: 0;
}
.card-body { padding: 12px; }
.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--charcoal);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-desc {
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 8px;
  line-height: 1.4;
}
.card-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
  font-size: 0.78rem;
  color: #666;
  margin-bottom: 8px;
}
.card-details.inline {
  grid-template-columns: auto auto 1fr;
}
.card-details .label { color: #999; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
.card-price {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--charcoal);
}
.card-price small { font-weight: 400; color: #999; font-size: 0.75rem; }
.card-highlight {
  font-size: 0.75rem;
  color: var(--gold-dark);
  font-weight: 500;
  font-style: italic;
  margin-bottom: 8px;
}
.card-link {
  display: inline-block;
  margin-top: 6px;
  font-size: 0.75rem;
  color: var(--gold-dark);
  text-decoration: none;
  font-weight: 600;
}
.card-link:hover { text-decoration: underline; }

/* ─── PHOTO CAROUSEL ─── */
.carousel {
  position: relative;
  width: 100%;
  height: 180px;
  overflow: hidden;
  border-radius: 12px 12px 0 0;
  background: var(--blush-light);
}
.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.carousel img.active { display: block; }
.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.85);
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  transition: all 0.2s;
  z-index: 2;
}
.carousel-btn:hover { background: white; transform: translateY(-50%) scale(1.1); }
.carousel-btn.prev { left: 6px; }
.carousel-btn.next { right: 6px; }
.carousel-dots {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  z-index: 2;
}
.carousel-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  border: none;
  padding: 0;
  cursor: pointer;
  transition: background 0.2s;
}
.carousel-dot.active { background: white; }
.carousel-counter {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 0.65rem;
  padding: 2px 7px;
  border-radius: 10px;
  z-index: 2;
}

/* Popup carousel */
.popup-carousel {
  position: relative;
  width: 220px;
  height: 140px;
  overflow: hidden;
  border-radius: 8px;
  margin-bottom: 8px;
}
.popup-carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.popup-carousel img.active { display: block; }
.popup-carousel .carousel-btn { width: 22px; height: 22px; font-size: 11px; }


/* ─── STAYS-STYLE CARD ACTIONS ─── */
.card-actions {
  display: flex; align-items: center; gap: 6px; margin-top: 8px;
  padding-top: 8px; border-top: 1px dashed var(--blush);
}
.action-icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2px solid var(--gold); background: var(--gold-light);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all 0.2s; flex-shrink: 0;
}
.action-icon-btn:hover { background: var(--gold); transform: translateY(-1px); }
.action-divider { width: 1px; height: 24px; background: var(--blush-dark); margin: 0 2px; flex-shrink: 0; }
.vote-btns { display: flex; gap: 5px; }
.vote-btn {
  font-size: 0.8rem; font-weight: 700; font-family: 'Montserrat', sans-serif;
  width: 32px; height: 32px; border: 2px solid var(--blush-dark); border-radius: 50%;
  cursor: pointer; background: var(--blush-light); color: var(--charcoal);
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
}
.vote-btn:hover { transform: scale(1.15); border-color: var(--gold); }
.vote-btn.selected { border-color: var(--gold); background: var(--gold); color: white; transform: scale(1.15); }
.rank-voters { font-size: 0.7rem; color: #999; margin-top: 2px; }

/* ─── GALLERY MODAL ─── */
.gallery-overlay {
  display: none; position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,0.95); flex-direction: column;
}
.gallery-overlay.show { display: flex; }
.gallery-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; background: rgba(0,0,0,0.5);
}
.gallery-title {
  font-family: 'Playfair Display', serif; color: white;
  font-size: 1.1rem; flex: 1;
}
.gallery-close {
  background: none; border: none; color: white;
  font-size: 2rem; cursor: pointer; padding: 0 8px; line-height: 1;
}
.gallery-close:hover { color: var(--gold); }
.gallery-body {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; padding: 10px;
}
.gallery-img {
  max-width: 90%; max-height: 80vh; object-fit: contain;
  border-radius: 8px; transition: opacity 0.15s ease;
}
.gallery-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.15); border: none; color: white;
  font-size: 2.5rem; width: 50px; height: 70px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.gallery-nav:hover { background: rgba(255,255,255,0.3); }
.gallery-nav.prev { left: 16px; }
.gallery-nav.next { right: 16px; }
.gallery-counter {
  text-align: center; color: rgba(255,255,255,0.7);
  font-size: 0.85rem; padding: 8px; font-weight: 500;
}

/* ─── MENU/INFO MODAL ─── */
.info-overlay {
  display: none; position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
}
.info-overlay.show { display: flex; }
.info-modal {
  background: var(--cream); border-radius: 16px; max-width: 500px; width: 90%;
  max-height: 80vh; overflow-y: auto; padding: 28px; position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.info-modal h2 {
  font-family: 'Playfair Display', serif; font-size: 1.3rem;
  margin-bottom: 4px; color: var(--charcoal);
}
.info-modal .info-subtitle { color: var(--gold-dark); font-size: 0.85rem; font-weight: 600; margin-bottom: 16px; }
.info-modal .info-desc { font-size: 0.9rem; line-height: 1.6; color: #444; margin-bottom: 16px; }
.info-modal .info-detail { display: flex; gap: 8px; align-items: center; padding: 8px 0; border-top: 1px solid var(--blush); font-size: 0.85rem; }
.info-modal .info-detail-icon { font-size: 1.1rem; width: 28px; text-align: center; flex-shrink: 0; }
.info-modal .info-close {
  position: absolute; top: 12px; right: 16px; background: none; border: none;
  font-size: 1.5rem; cursor: pointer; color: #999; line-height: 1;
}
.info-modal .info-close:hover { color: var(--charcoal); }

/* ─── MAP ─── */
.map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* ─── VOTER MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--white);
  border-radius: 16px;
  padding: 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h2 {
  font-family: 'Playfair Display', serif;
  color: var(--charcoal);
  margin-bottom: 8px;
}
.modal p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
.modal input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--blush);
  border-radius: 10px;
  font-family: 'Montserrat', sans-serif;
  font-size: 1rem;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.modal input:focus { border-color: var(--gold); }
.modal button {
  margin-top: 16px;
  background: var(--gold);
  color: var(--white);
  border: none;
  padding: 12px 32px;
  border-radius: 24px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  letter-spacing: 0.5px;
}
.modal button:hover { background: var(--gold-dark); }

/* ─── RESULTS OVERLAY ─── */
.results-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.results-overlay.show { display: flex; }
.results-panel {
  background: var(--white);
  border-radius: 16px;
  padding: 32px;
  max-width: 700px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.results-panel h2 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  margin-bottom: 20px;
  color: var(--charcoal);
}
.results-close {
  position: absolute;
  top: 20px; right: 30px;
  font-size: 2rem;
  color: var(--white);
  cursor: pointer;
  background: none;
  border: none;
}
.result-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--blush-light);
}
.result-rank { font-weight: 700; color: var(--gold-dark); width: 30px; text-align: center; }
.result-name { flex: 1; font-weight: 500; }
.result-bar-wrap { width: 200px; }
.result-bar { height: 20px; border-radius: 10px; display: flex; overflow: hidden; background: var(--blush-light); }
.result-bar div { height: 100%; transition: width 0.5s; }
.result-bar .love { background: #FF6B8A; }
.result-bar .like { background: var(--gold); }
.result-bar .meh { background: #CCC; }
.result-bar .nah { background: #999; }
.result-votes { width: 60px; text-align: right; font-size: 0.8rem; color: #999; }
.legend { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; font-size: 0.8rem; }
.legend span { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

/* ─── DETAIL MODAL ─── */
.detail-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.detail-overlay.show { display: flex; }
.detail-panel {
  background: var(--white);
  border-radius: 16px;
  padding: 0;
  max-width: 600px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.detail-header {
  position: sticky;
  top: 0;
  background: var(--white);
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--blush);
  border-radius: 16px 16px 0 0;
  z-index: 1;
}
.detail-header a {
  color: var(--gold-dark);
  font-size: 0.8rem;
  font-weight: 600;
  text-decoration: none;
}
.detail-header a:hover { text-decoration: underline; }
.detail-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  color: var(--charcoal);
  margin: 4px 0;
}
.detail-close {
  position: absolute;
  top: 12px; right: 16px;
  font-size: 1.5rem;
  color: #999;
  cursor: pointer;
  background: none;
  border: none;
  line-height: 1;
}
.detail-close:hover { color: var(--charcoal); }
.detail-body {
  padding: 16px 20px 20px;
  font-size: 0.85rem;
  line-height: 1.6;
  color: #444;
}
.detail-body b { color: var(--charcoal); }
.detail-carousel {
  width: 100%;
  height: 220px;
  position: relative;
  overflow: hidden;
}
.detail-carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0; left: 0;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.detail-carousel img.active { opacity: 1; }
.detail-carousel .carousel-btn { top: 50%; }

/* ─── HAMBURGER MENU ─── */
.hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 1002;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--charcoal);
  margin: 5px 0;
  border-radius: 2px;
  transition: all 0.3s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
.menu-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  right: 12px;
  background: var(--white);
  border: 1px solid var(--blush);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  padding: 8px;
  z-index: 1001;
  flex-direction: column;
  gap: 4px;
  min-width: 160px;
}
.menu-dropdown.show { display: flex; }
.menu-dropdown .header-btn { width: 100%; text-align: center; }

let voterName = '';
let votes = {};
let currentSort = 'rank';

let pendingSave = false;

// ─── VOTES API (Vercel serverless function) ───
const VOTES_API = 'https://bach-votes.vercel.app/api/brunch-votes';

async function loadVotes() {
  const dot = document.getElementById('syncStatus');
  try {
    const res = await fetch(VOTES_API);
    if (res.ok) {
      votes = await res.json();
      if (dot) dot.innerHTML = '&#x1f7e2; Synced';
    }
  } catch(e) {
    console.warn('Failed to load votes', e);
    if (dot) dot.innerHTML = '&#x1f534; Offline';
    const saved = localStorage.getItem('bach_brunch_votes');
    if (saved) try { votes = JSON.parse(saved); } catch(e) {}
  }
}

async function saveVotes() {
  localStorage.setItem('bach_brunch_votes', JSON.stringify(votes));

  if (isSaving) { pendingSave = true; return; }
  isSaving = true;
  const dot = document.getElementById('syncStatus');
  if (dot) dot.innerHTML = '&#x1f7e1; Saving...';

  try {
    const res = await fetch(VOTES_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(votes)
    });
    if (res.ok) {
      if (dot) dot.innerHTML = '&#x1f7e2; Synced';
    } else {
      if (dot) dot.innerHTML = '&#x1f534; Save failed';
    }
  } catch(e) {
    console.warn('Failed to save votes', e);
    if (dot) dot.innerHTML = '&#x1f534; Offline';
  }
  isSaving = false;
  if (pendingSave) { pendingSave = false; saveVotes(); }
}

// ─── INIT ───
window.addEventListener('DOMContentLoaded', async () => {
  const savedName = localStorage.getItem('bach_voter_name');
  if (savedName) voterName = savedName;

  await loadVotes();

  if (!voterName) {
    document.getElementById('voterModal').classList.add('show');
  } else {
    updateVoterDisplays('Voting as: ' + voterName);
  }

  renderCards();
  initMap();

  setInterval(async () => {
    await loadVotes();
    renderCards();
  }, 10000);
});

// ─── VOTING ───
const EMOJIS = [
  { emoji: '\u{1F44D}', label: 'Yes!', key: 'love' },
  { emoji: '\u{1F44E}', label: 'Nah', key: 'nah' }
];

function castVote(activityId, emojiKey) {
  if (!voterName) { document.getElementById('voterModal').classList.add('show'); return; }

  if (!votes[activityId]) votes[activityId] = {};
  if (votes[activityId][voterName] === emojiKey) {
    delete votes[activityId][voterName];
  } else {
    votes[activityId][voterName] = emojiKey;
  }
  saveVotes();
  renderCards();
}

// ─── SHARE LINK ───
function copyShareLink() {
  const pageUrl = 'https://chelseal11.github.io/megans-bach-charleston/activities.html';
  navigator.clipboard.writeText(pageUrl).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Share Link'; }, 2000);
  }).catch(() => {
    prompt('Copy this link and share it with the group:', pageUrl);
  });
}

// ─── FILTERS & SORT ───
function toggleFilter(filter) {
  const btn = document.getElementById('filter-' + filter);
  if (activeFilters.has(filter)) {
    activeFilters.delete(filter);
    btn.classList.remove('active');
  } else {
    activeFilters.add(filter);
    btn.classList.add('active');
  }
  applyFiltersAndSort();
}

function sortListings(key) {
  currentSort = key;
  document.querySelectorAll('.sort-bar .sort-btn').forEach(b => {
    if (b.id.startsWith('sort-')) b.classList.remove('active');
  });
  document.getElementById('sort-' + key).classList.add('active');
  applyFiltersAndSort();
}

function applyFiltersAndSort() {
  let filtered = [...ACTIVITIES];

  if (activeFilters.size > 0) {
    filtered = filtered.filter(a => activeFilters.has(a.category));
  }

  filtered.sort((a, b) => {
    if (currentSort === 'price') return a.price - b.price;
    return a.rank - b.rank;
  });

  sortedActivities = filtered;
  renderCards();
  updateMapMarkers();
}

function updateMapMarkers() {
  if (!map) return;
  const visibleIds = new Set(sortedActivities.map(a => a.id));
  ACTIVITIES.forEach(a => {
    if (markers[a.id]) {
      if (visibleIds.has(a.id)) {
        if (!map.hasLayer(markers[a.id])) markers[a.id].addTo(map);
      } else {
        map.removeLayer(markers[a.id]);
      }
    }
  });
  const visible = sortedActivities.map(a => markers[a.id]).filter(Boolean);
  if (visible.length > 0) {
    const group = L.featureGroup(visible);
    map.fitBounds(group.getBounds().pad(0.15));
  }
}

};

function renderCards() {
  const container = document.getElementById('cardList');
  container.innerHTML = sortedActivities.map(a => {
    const activityVotes = votes[a.id] || {};
    const myVote = voterName ? activityVotes[voterName] : null;
    const voteCount = Object.keys(activityVotes).length;
    const priceStr = a.price === 0 ? 'Free' : '$' + a.price;
    const photos = a.photos || [];
    const rankVoters = Object.entries(activityVotes).map(([name, vote]) => {
      const em = vote === 'love' ? '\u{1F44D}' : '\u{1F44E}';
      return em + ' ' + name;
    }).join(' \u2022 ');

    return `
    <div class="card" id="card-${a.id}">
      ${photos.length > 0 ? `
      <div class="carousel" id="carousel-${a.id}" onclick="event.stopPropagation()">
        ${photos.map((p, idx) => `<img src="${p}" alt="${a.name}" class="${idx === 0 ? 'active' : ''}" loading="lazy">`).join('')}
        ${photos.length > 1 ? `
          <button class="carousel-btn prev" onclick="slideCarousel('${a.id}', -1)">\u2039</button>
          <button class="carousel-btn next" onclick="slideCarousel('${a.id}', 1)">\u203A</button>
          <div class="carousel-counter"><span id="counter-${a.id}">1</span>/${photos.length}</div>
          <div class="carousel-dots">
            ${photos.map((_, idx) => `<button class="carousel-dot ${idx === 0 ? 'active' : ''}" onclick="goToSlide('${a.id}', ${idx})"></button>`).join('')}
          </div>
        ` : ''}
      </div>` : ''}
      <div class="card-body" onclick="flyTo(${a.lat}, ${a.lng}, '${a.id}')">
        <div class="card-name"><span class="card-rank">${a.rank}</span>${a.name}</div>
        <div class="card-details inline">
          <div><span class="label">Price</span><br><span class="card-price">${priceStr}</span><small>/pp</small></div>
          <div><span class="label">Duration</span><br>${a.duration}</div>
          <div><span class="label">Group</span><br>${a.groupSize}</div>
        </div>
        <div class="card-highlight">${a.highlight}</div>
        <div class="card-actions">
          <button class="action-icon-btn" onclick="event.stopPropagation(); openGallery('${a.id}')" title="Photos">\u{1F4F7}</button>
          <button class="action-icon-btn" onclick="event.stopPropagation(); openMenu('${a.id}')" title="Menu">\u{1F4CB}</button>
          <div class="action-divider"></div>
          <button class="vote-btn ${myVote === 'love' ? 'selected' : ''}"
                  onclick="event.stopPropagation(); castVote('${a.id}', 'love')"
                  title="Yes!">\u{1F44D}</button>
          <button class="vote-btn ${myVote === 'nah' ? 'selected' : ''}"
                  onclick="event.stopPropagation(); castVote('${a.id}', 'nah')"
                  title="Nah">\u{1F44E}</button>
          ${voteCount > 0 ? `<span class="rank-voters">${voteCount}</span>` : ''}
        </div>
        ${rankVoters ? '<div class="rank-voters">' + rankVoters + '</div>' : ''}
      </div>
    </div>`;
  }).join('');
}
// ─── CAROUSEL ───
function slideCarousel(id, direction, isPopup) {
  const carousel = document.getElementById(isPopup ? id : 'carousel-' + id);
  const imgs = carousel.querySelectorAll('img');
  const dots = carousel.querySelectorAll('.carousel-dot');
  let current = [...imgs].findIndex(img => img.classList.contains('active'));
  imgs[current].classList.remove('active');
  if (dots[current]) dots[current].classList.remove('active');
  current = (current + direction + imgs.length) % imgs.length;
  imgs[current].classList.add('active');
  if (dots[current]) dots[current].classList.add('active');
  const counter = document.getElementById('counter-' + id);
  if (counter) counter.textContent = current + 1;
}

function goToSlide(id, index) {
  const carousel = document.getElementById('carousel-' + id);
  const imgs = carousel.querySelectorAll('img');
  const dots = carousel.querySelectorAll('.carousel-dot');
  imgs.forEach((img, i) => { img.classList.toggle('active', i === index); });
  dots.forEach((dot, i) => { dot.classList.toggle('active', i === index); });
  const counter = document.getElementById('counter-' + id);
  if (counter) counter.textContent = index + 1;
}

// ─── MAP ───
let map, markers = {};

const CATEGORY_COLORS = {
  boat: '#0369A1',
  food: '#B8922F',
  nightlife: '#7C3AED',
  wellness: '#059669',
  tour: '#EA580C',
  class: '#DB2777',
  beach: '#0D9488',
  brunch: '#D97706',
  hike: '#16A34A',
  fun: '#E11D48',
  dinner: '#7E22CE'
};

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([32.7855, -79.9390], 14);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 19
  }).addTo(map);

  ACTIVITIES.forEach(a => {
    const color = CATEGORY_COLORS[a.category] || '#5B8DD9';
    const icon = L.divIcon({
      className: 'activity-marker',
      html: `<div style="
        background:${color};
        color:white;
        font-weight:700;
        font-size:12px;
        width:26px;
        height:26px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        border:2px solid white;
        box-shadow:0 2px 6px rgba(0,0,0,0.3);
        font-family:Montserrat,sans-serif;
      ">${a.rank}</div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 13]
    });

    const priceStr = a.price === 0 ? 'Free' : '$' + a.price + '/pp';
    const marker = L.marker([a.lat, a.lng], { icon })
      .addTo(map)
      .bindPopup(`
        <div style="font-family:Montserrat,sans-serif; max-width:220px;">
          <b style="font-family:Playfair Display,serif; font-size:14px;">${a.name}</b><br>
          <span style="color:${color}; font-weight:600;">${CATEGORY_LABELS[a.category]}</span><br>
          <b>${priceStr}</b> &bull; ${a.duration}<br>
          <em style="color:#D4A843; font-size:12px;">${a.highlight}</em><br>
          <a href="${a.url}" target="_blank" style="color:#D4A843;">Learn More</a>
        </div>
      `, { maxWidth: 240 });
    markers[a.id] = marker;
  });

  const group = L.featureGroup(Object.values(markers));
  map.fitBounds(group.getBounds().pad(0.15));
}

function flyTo(lat, lng, id) {
  map.flyTo([lat, lng], 16, { duration: 0.8 });
  markers[id].openPopup();
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + id).classList.add('active');
}

// ─── RESULTS ───
function showResults() {
  const body = document.getElementById('resultsBody');
  const sorted = [...ACTIVITIES].sort((a, b) => {
    const aVotes = votes[a.id] || {};
    const bVotes = votes[b.id] || {};
    const aScore = calcVoteScore(aVotes);
    const bScore = calcVoteScore(bVotes);
    return bScore - aScore;
  });

  body.innerHTML = sorted.map((a, i) => {
    const v = votes[a.id] || {};
    const counts = { love: 0, like: 0, meh: 0, nah: 0 };
    Object.values(v).forEach(val => { if (counts[val] !== undefined) counts[val]++; });
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    const pct = key => total > 0 ? (counts[key] / total * 100) : 0;
    const voters = Object.entries(v).map(([name, vote]) => {
      const em = EMOJIS.find(e => e.key === vote);
      return em ? em.emoji + ' ' + name : name;
    }).join(', ');

    return `
      <div class="result-row">
        <div class="result-rank">${i + 1}</div>
        <div class="result-name">
          ${a.name}
          ${voters ? '<br><span style="font-size:0.75rem;color:#999;">' + voters + '</span>' : ''}
        </div>
        <div class="result-bar-wrap">
          <div class="result-bar">
            <div class="love" style="width:${pct('love')}%"></div>
            <div class="nah" style="width:${pct('nah')}%"></div>
          </div>
        </div>
        <div class="result-votes">${total} vote${total !== 1 ? 's' : ''}</div>
      </div>`;
  }).join('');

  document.getElementById('resultsOverlay').classList.add('show');
}

function closeResults() {
  document.getElementById('resultsOverlay').classList.remove('show');
}

function calcVoteScore(voteObj) {
  const weights = { love: 3, like: 2, meh: 1, nah: 0 };
  let total = 0, count = 0;
  Object.values(voteObj).forEach(v => {
    if (weights[v] !== undefined) { total += weights[v]; count++; }
  });
  return count > 0 ? total / count * count : 0;
}

// ─── DETAIL MODAL ───
const ACTIVITY_DETAILS = {};

function showDetail(id) {
  const a = ACTIVITIES.find(x => x.id === id);
  if (!a) return;

  document.getElementById('detailTitle').textContent = a.name;
  document.getElementById('detailLink').href = a.url;

  // Carousel
  const carousel = document.getElementById('detailCarousel');
  const photos = a.photos || [];
  if (photos.length > 0) {
    carousel.style.display = 'block';
    carousel.innerHTML = photos.map((p, i) =>
      `<img src="${p}" class="${i === 0 ? 'active' : ''}">`
    ).join('') + (photos.length > 1 ? `
      <button class="carousel-btn prev" onclick="slideDetailCarousel(-1)">\u2039</button>
      <button class="carousel-btn next" onclick="slideDetailCarousel(1)">\u203A</button>
    ` : '');
  } else {
    carousel.style.display = 'none';
  }

  // Body
  const body = document.getElementById('detailBody');
  if (a.details) {
    body.innerHTML = a.details;
  } else {
    const priceStr = a.price === 0 ? 'Free' : '$' + a.price + '/pp';
    const travel = a.driveTime
      ? '\u{1F697} ' + a.driveTime + ' drive \u2022 ~' + a.uberEstimate + ' Uber'
      : '\u{1F6B6} ' + (a.walkTime || 'On King St');
    body.innerHTML = `
      <b>${a.desc}</b><br><br>
      <b>Price:</b> ${priceStr}<br>
      <b>Duration:</b> ${a.duration}<br>
      <b>Travel:</b> ${travel}<br><br>
      <em style="color:var(--gold-dark);">${a.highlight}</em>
    `;
  }

  document.getElementById('detailOverlay').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
}

function slideDetailCarousel(dir) {
  const carousel = document.getElementById('detailCarousel');
  const imgs = carousel.querySelectorAll('img');
  let current = [...imgs].findIndex(img => img.classList.contains('active'));
  imgs[current].classList.remove('active');
  current = (current + dir + imgs.length) % imgs.length;
  imgs[current].classList.add('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('resultsOverlay').classList.remove('show');
    closeGallery();
    closeInfo();
    closeDetail();
  }
});


// ─── PHOTO GALLERY ───
let galleryPhotos = [];
let galleryIndex = 0;

function openGallery(activityId) {
  const a = ACTIVITIES.find(x => x.id === activityId);
  if (!a || !a.photos || a.photos.length === 0) return;
  galleryPhotos = a.photos;
  galleryIndex = 0;
  document.getElementById('galleryTitle').textContent = a.name;
  document.getElementById('galleryImg').src = galleryPhotos[0];
  document.getElementById('galleryCounter').textContent = '1 / ' + galleryPhotos.length;
  document.getElementById('galleryOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeGallery() {
  document.getElementById('galleryOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function galleryNav(dir) {
  galleryIndex = (galleryIndex + dir + galleryPhotos.length) % galleryPhotos.length;
  const img = document.getElementById('galleryImg');
  img.style.opacity = '0';
  setTimeout(() => { img.src = galleryPhotos[galleryIndex]; img.style.opacity = '1'; }, 150);
  document.getElementById('galleryCounter').textContent = (galleryIndex + 1) + ' / ' + galleryPhotos.length;
}

// ─── MENU/INFO MODAL ───
function openMenu(activityId) {
  const a = ACTIVITIES.find(x => x.id === activityId);
  if (!a) return;
  document.getElementById('infoTitle').textContent = a.name;
  document.getElementById('infoSubtitle').textContent = a.category === 'brunch' ? 'Brunch' : 'Dinner';
  document.getElementById('infoDesc').innerHTML = a.details || a.desc;
  
  let html = '';
  if (a.menuUrl) {
    html += '<div style="margin-top:12px;"><a href="' + a.menuUrl + '" target="_blank" style="display:inline-block;background:var(--gold);color:white;padding:8px 16px;border-radius:20px;font-weight:600;font-size:0.85rem;text-decoration:none;">View Full Menu \u2192</a></div>';
  }
  document.getElementById('infoDetails').innerHTML = html;
  document.getElementById('infoOverlay').classList.add('show');
}

function closeInfo() {
  document.getElementById('infoOverlay').classList.remove('show');
}

</script>

<!-- Menu/Info Modal -->
<div class="info-overlay" id="infoOverlay" onclick="closeInfo()">
  <div class="info-modal" onclick="event.stopPropagation()">
    <button class="info-close" onclick="closeInfo()">&times;</button>
    <h2 id="infoTitle"></h2>
    <div class="info-subtitle" id="infoSubtitle"></div>
    <div class="info-desc" id="infoDesc"></div>
    <div id="infoDetails"></div>
  </div>
</div>

<!-- Photo Gallery Modal -->
<div class="gallery-overlay" id="galleryOverlay">
  <div class="gallery-header">
    <span class="gallery-title" id="galleryTitle"></span>
    <button class="gallery-close" onclick="closeGallery()">&times;</button>
  </div>
  <div class="gallery-body" onclick="closeGallery()">
    <button class="gallery-nav prev" onclick="event.stopPropagation(); galleryNav(-1)">&lsaquo;</button>
    <img id="galleryImg" class="gallery-img" onclick="event.stopPropagation()" src="" alt="">
    <button class="gallery-nav next" onclick="event.stopPropagation(); galleryNav(1)">&rsaquo;</button>
  </div>
  <div class="gallery-counter" id="galleryCounter"></div>
</div>
