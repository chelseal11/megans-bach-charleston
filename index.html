<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Megan's Charleston Bachelorette</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap');

:root {
  --blush: #F2D1D1;
  --blush-light: #FDF0F0;
  --blush-dark: #E8A5A5;
  --gold: #D4A843;
  --gold-light: #F0DBA8;
  --gold-dark: #B8922F;
  --charcoal: #2D2D2D;
  --white: #FFFFFF;
  --cream: #FFF9F5;
  --sage: #B5C4B1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--cream);
  color: var(--charcoal);
  overflow: hidden;
  height: 100vh;
}

/* ─── TAB BAR ─── */
.tab-bar {
  display: flex; background: var(--charcoal);
}
.tab-bar a {
  flex: 1; text-align: center; padding: 10px 12px;
  font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 600;
  color: rgba(255,255,255,0.6); text-decoration: none;
  letter-spacing: 0.5px; transition: all 0.2s;
  border-bottom: 3px solid transparent;
}
.tab-bar a:hover { color: white; }
.tab-bar a.active { color: white; border-bottom-color: var(--gold); }

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, var(--blush) 0%, var(--blush-light) 50%, var(--gold-light) 100%);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--gold);
  z-index: 1000;
  position: relative;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--charcoal);
  letter-spacing: 1px;
}
.header h1 span { color: var(--gold-dark); }
.header-actions { display: flex; gap: 10px; align-items: center; }
.header-btn {
  background: var(--gold);
  color: var(--white);
  border: none;
  padding: 8px 16px;
  border-radius: 20px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.header-btn:hover { background: var(--gold-dark); transform: translateY(-1px); }
.header-btn.outline {
  background: transparent;
  border: 2px solid var(--gold);
  color: var(--gold-dark);
}
.header-btn.outline:hover { background: var(--gold); color: var(--white); }

/* ─── MAIN LAYOUT ─── */
.main {
  display: flex;
  height: calc(100vh - 58px - 39px);
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: 420px;
  min-width: 420px;
  overflow-y: auto;
  background: var(--cream);
  border-right: 1px solid var(--blush);
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--blush-dark) transparent;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--blush-dark); border-radius: 3px; }

.sidebar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--gold-dark);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--gold-light);
}

/* ─── SORT BAR ─── */
.sort-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.sort-label {
  font-size: 0.7rem;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 2px;
}
.sort-btn {
  background: var(--blush-light);
  border: 1px solid var(--blush);
  color: var(--charcoal);
  padding: 4px 10px;
  border-radius: 14px;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.sort-btn:hover { background: var(--blush); }
.sort-btn.active {
  background: var(--gold);
  color: var(--white);
  border-color: var(--gold);
}

/* ─── POOL/HOT TUB BADGE ─── */
.amenity-badges { display: flex; gap: 6px; margin: 6px 0 4px 40px; flex-wrap: wrap; }
.amenity-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: linear-gradient(135deg, #E0F2FE, #BAE6FD);
  color: #0369A1;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid #7DD3FC;
}
.amenity-badge.hot-tub {
  background: linear-gradient(135deg, #FEF3C7, #FDE68A);
  color: #92400E;
  border-color: #FCD34D;
}
.amenity-badge.parking {
  background: linear-gradient(135deg, #ECFDF5, #A7F3D0);
  color: #065F46;
  border-color: #6EE7B7;
}
.card.has-water-feature {
  border-left: 3px solid #38BDF8;
}

/* ─── LISTING CARD ─── */
.card {
  background: var(--white);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border: 1px solid var(--blush);
  transition: all 0.25s;
  cursor: pointer;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,168,67,0.15); border-color: var(--gold-light); }
.card.active { border: 2px solid var(--gold); box-shadow: 0 6px 20px rgba(212,168,67,0.25); }

.card-rank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  background: var(--gold);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  border-radius: 50%;
  flex-shrink: 0;
}
.card-body { padding: 12px; }
.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--charcoal);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-score-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--white);
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 40px;
  margin-bottom: 8px;
}
.card-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
  font-size: 0.78rem;
  color: #666;
  margin-bottom: 8px;
  clear: both;
}
.card-details .label { color: #999; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
.card-highlight {
  font-size: 0.75rem;
  color: var(--gold-dark);
  font-weight: 500;
  font-style: italic;
  margin-bottom: 8px;
}
.card-price {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--charcoal);
}
.card-price small { font-weight: 400; color: #999; font-size: 0.75rem; }
.card-actions {
  display: flex; align-items: center; gap: 6px; margin-top: 8px;
  padding-top: 8px; border-top: 1px dashed var(--blush);
}
.card-actions .rank-voters {
  width: 100%; margin-top: 2px;
}
.action-icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2px solid var(--gold); background: var(--gold-light);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all 0.2s; flex-shrink: 0;
}
.action-icon-btn:hover { background: var(--gold); transform: translateY(-1px); }
.action-divider { width: 1px; height: 24px; background: var(--blush-dark); margin: 0 2px; flex-shrink: 0; }

/* ─── PHOTO CAROUSEL ─── */
.carousel {
  position: relative;
  width: 100%;
  height: 180px;
  overflow: hidden;
  border-radius: 12px 12px 0 0;
  background: var(--blush-light);
}
.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.carousel img.active { display: block; }
.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.85);
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  transition: all 0.2s;
  z-index: 2;
}
.carousel-btn:hover { background: white; transform: translateY(-50%) scale(1.1); }
.carousel-btn.prev { left: 6px; }
.carousel-btn.next { right: 6px; }
.carousel-dots {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  z-index: 2;
}
.carousel-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  border: none;
  padding: 0;
  cursor: pointer;
  transition: background 0.2s;
}
.carousel-dot.active { background: white; }
.carousel-counter {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 0.65rem;
  padding: 2px 7px;
  border-radius: 10px;
  z-index: 2;
}

/* Popup carousel */
.popup-carousel {
  position: relative;
  width: 220px;
  height: 140px;
  overflow: hidden;
  border-radius: 8px;
  margin-bottom: 8px;
}
.popup-carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.popup-carousel img.active { display: block; }
.popup-carousel .carousel-btn { width: 22px; height: 22px; font-size: 11px; }

/* Score bars */
.score-bars { margin: 8px 0; }
.score-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 0.7rem; }
.score-bar-label { width: 65px; color: #999; text-transform: uppercase; letter-spacing: 0.3px; }
.score-bar-track { flex: 1; height: 6px; background: var(--blush-light); border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.score-bar-fill.location { background: linear-gradient(90deg, var(--sage), #8BA888); }
.score-bar-fill.value { background: linear-gradient(90deg, var(--gold-light), var(--gold)); }
.score-bar-fill.bach { background: linear-gradient(90deg, var(--blush), var(--blush-dark)); }

/* ─── VOTING ─── */
.vote-btns { display: flex; gap: 5px; }
.vote-btn {
  font-size: 0.8rem;
  font-weight: 700;
  font-family: 'Montserrat', sans-serif;
  width: 32px; height: 32px;
  border: 2px solid var(--blush-dark);
  border-radius: 50%;
  cursor: pointer;
  background: var(--blush-light);
  color: var(--charcoal);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.vote-btn:hover { transform: scale(1.15); border-color: var(--gold); }
.vote-btn.selected { border-color: var(--gold); background: var(--gold); color: white; transform: scale(1.15); }
.rank-voters { font-size: 0.7rem; color: #999; margin-top: 2px; }

/* ─── MAP ─── */
.map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* ─── VOTER MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--white);
  border-radius: 16px;
  padding: 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h2 {
  font-family: 'Playfair Display', serif;
  color: var(--charcoal);
  margin-bottom: 8px;
}
.modal p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
.modal input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--blush);
  border-radius: 10px;
  font-family: 'Montserrat', sans-serif;
  font-size: 1rem;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.modal input:focus { border-color: var(--gold); }
.modal button {
  margin-top: 16px;
  background: var(--gold);
  color: var(--white);
  border: none;
  padding: 12px 32px;
  border-radius: 24px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  letter-spacing: 0.5px;
}
.modal button:hover { background: var(--gold-dark); }

/* ─── RESULTS OVERLAY ─── */
.results-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.results-overlay.show { display: flex; }
.results-panel {
  background: var(--white);
  border-radius: 16px;
  padding: 32px;
  max-width: 700px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  position: relative;
}
.results-panel h2 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  margin-bottom: 20px;
  color: var(--charcoal);
}
.results-close {
  position: absolute;
  top: 12px; right: 16px;
  font-size: 1.5rem;
  color: #999;
  cursor: pointer;
  background: none;
  border: none;
  line-height: 1;
}
.results-close:hover { color: var(--charcoal); }
.result-card {
  background: var(--blush-light); border-radius: 12px; padding: 16px;
  margin-bottom: 12px; position: relative;
}
.result-card.leader { border: 2px solid var(--gold); background: linear-gradient(135deg, var(--gold-light) 0%, var(--blush-light) 100%); }
.result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.result-position {
  width: 32px; height: 32px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-weight: 700;
  font-size: 0.9rem; flex-shrink: 0; color: white;
}
.result-position.p1 { background: var(--gold); }
.result-position.p2 { background: var(--blush-dark); }
.result-position.p3 { background: #B5C4B1; }
.result-position.p4, .result-position.p5 { background: #CCC; }
.result-listing-name { font-weight: 600; font-size: 0.95rem; flex: 1; }
.result-score { font-weight: 700; color: var(--gold-dark); font-size: 1.1rem; white-space: nowrap; }
.result-score small { font-weight: 400; font-size: 0.75rem; color: #999; }
.result-voters {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.voter-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: white; border-radius: 20px; padding: 4px 10px;
  font-size: 0.75rem; font-weight: 500; border: 1px solid var(--blush);
}
.voter-chip .voter-rank {
  width: 18px; height: 18px; border-radius: 50%; display: inline-flex;
  align-items: center; justify-content: center; font-size: 0.65rem;
  font-weight: 700; color: white; flex-shrink: 0;
}
.voter-rank.r1 { background: var(--gold); }
.voter-rank.r2 { background: var(--blush-dark); }
.voter-rank.r3 { background: #B5C4B1; }
.result-no-votes { color: #999; font-size: 0.8rem; font-style: italic; }
.results-summary {
  text-align: center; margin-bottom: 20px; padding: 12px;
  background: var(--blush-light); border-radius: 10px; font-size: 0.85rem;
}
.results-summary strong { color: var(--gold-dark); }
.results-legend {
  display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; font-size: 0.75rem; color: #666;
}
.results-legend span { display: flex; align-items: center; gap: 4px; }
.results-legend-dot {
  width: 10px; height: 10px; border-radius: 50%; display: inline-block;
}

/* ─── HAMBURGER MENU ─── */
.hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 1002;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--charcoal);
  margin: 5px 0;
  border-radius: 2px;
  transition: all 0.3s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
.menu-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  right: 12px;
  background: var(--white);
  border: 1px solid var(--blush);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  padding: 8px;
  z-index: 1001;
  flex-direction: column;
  gap: 4px;
  min-width: 160px;
}
.menu-dropdown.show { display: flex; }
.menu-dropdown .header-btn { width: 100%; text-align: center; }
.menu-dropdown .menu-info { font-size: 0.75rem; color: var(--gold-dark); font-weight: 600; padding: 6px 8px; text-align: center; }

/* ─── MOBILE ─── */
@media (max-width: 768px) {
  .hamburger { display: block; }
  .header-actions { display: none; }
  .header { padding: 10px 16px; }
  .header h1 { font-size: 1.1rem; }
  .main { flex-direction: column; }
  body { overflow: auto; height: auto; }
  .sidebar { width: 100%; min-width: unset; order: 2; max-height: none; overflow-y: visible; }
  .map-container { height: 35vh; min-height: 200px; order: 1; }
  .card-details { grid-template-columns: 1fr 1fr; }
  .sort-bar { gap: 4px; }
  .sort-btn { padding: 4px 8px; font-size: 0.65rem; }
}

/* ─── PHOTO GALLERY MODAL ─── */
.gallery-overlay {
  display: none; position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,0.95); flex-direction: column;
}
.gallery-overlay.show { display: flex; }
.gallery-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; background: rgba(0,0,0,0.5);
}
.gallery-title {
  font-family: 'Playfair Display', serif; color: white;
  font-size: 1.1rem; flex: 1;
}
.gallery-close {
  background: none; border: none; color: white;
  font-size: 2rem; cursor: pointer; padding: 0 8px; line-height: 1;
}
.gallery-close:hover { color: var(--gold); }
.gallery-body {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; padding: 10px;
}
.gallery-img {
  max-width: 90%; max-height: 80vh; object-fit: contain;
  border-radius: 8px; transition: opacity 0.15s ease;
}
.gallery-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.15); border: none; color: white;
  font-size: 2.5rem; width: 50px; height: 70px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.gallery-nav:hover { background: rgba(255,255,255,0.3); }
.gallery-nav.prev { left: 16px; }
.gallery-nav.next { right: 16px; }
.gallery-counter {
  text-align: center; color: rgba(255,255,255,0.7);
  font-size: 0.85rem; padding: 8px; font-weight: 500;
}
/* ─── INFO MODAL ─── */
.info-overlay {
  display: none; position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
}
.info-overlay.show { display: flex; }
.info-modal {
  background: var(--cream); border-radius: 16px; max-width: 500px; width: 90%;
  max-height: 80vh; overflow-y: auto; padding: 28px; position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.info-modal h2 {
  font-family: 'Playfair Display', serif; font-size: 1.3rem;
  margin-bottom: 4px; color: var(--charcoal);
}
.info-modal .info-subtitle { color: var(--gold-dark); font-size: 0.85rem; font-weight: 600; margin-bottom: 16px; }
.info-modal .info-desc { font-size: 0.9rem; line-height: 1.6; color: #444; margin-bottom: 16px; }
.info-modal .info-detail { display: flex; gap: 8px; align-items: center; padding: 8px 0; border-top: 1px solid var(--blush); font-size: 0.85rem; }
.info-modal .info-detail-icon { font-size: 1.1rem; width: 28px; text-align: center; flex-shrink: 0; }
.info-modal .info-close {
  position: absolute; top: 12px; right: 16px; background: none; border: none;
  font-size: 1.5rem; cursor: pointer; color: #999; line-height: 1;
}
.info-modal .info-close:hover { color: var(--charcoal); }

/* card-popup — make Leaflet popups host a full card */
.leaflet-popup.card-popup .leaflet-popup-content-wrapper { padding: 0; background: transparent; box-shadow: 0 8px 30px rgba(0,0,0,0.18); border-radius: 14px; }
.leaflet-popup.card-popup .leaflet-popup-content { margin: 0; width: 380px !important; }
.leaflet-popup.card-popup .leaflet-popup-tip { background: white; }
.leaflet-popup.card-popup .card { margin: 0; box-shadow: none; border: none; border-radius: 14px; }

// Upper King reference point
const UPPER_KING = { lat: 32.7876, lng: -79.9378 };

// ─── STATE ───
let voterName = '';
let votes = {}; // { listingId: { voterName: emoji } }
let currentSort = 'score';
let activeFilters = new Set();
let sortedListings = [...LISTINGS];
let isSaving = false;
let pendingSave = false;

// ─── VOTES API (Vercel serverless function) ───
const VOTES_API = 'https://bach-votes.vercel.app/api/votes';

async function loadVotes() {
  const dot = document.getElementById('syncStatus');
  try {
    const res = await fetch(VOTES_API);
    if (res.ok) {
      votes = await res.json();
      dot.innerHTML = '&#x1f7e2; Synced';
    }
  } catch(e) {
    console.warn('Failed to load votes', e);
    dot.innerHTML = '&#x1f534; Offline';
    const saved = localStorage.getItem('bach_votes');
    if (saved) try { votes = JSON.parse(saved); } catch(e) {}
  }
}

async function saveVotes() {
  localStorage.setItem('bach_votes', JSON.stringify(votes));

  if (isSaving) { pendingSave = true; return; }
  isSaving = true;
  const dot = document.getElementById('syncStatus');
  dot.innerHTML = '&#x1f7e1; Saving...';

  try {
    const res = await fetch(VOTES_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(votes)
    });
    if (res.ok) {
      dot.innerHTML = '&#x1f7e2; Synced';
    } else {
      dot.innerHTML = '&#x1f534; Save failed';
    }
  } catch(e) {
    console.warn('Failed to save votes', e);
    dot.innerHTML = '&#x1f534; Offline';
  }
  isSaving = false;
  if (pendingSave) { pendingSave = false; saveVotes(); }
}

// ─── INIT ───
window.addEventListener('DOMContentLoaded', async () => {
  const savedName = localStorage.getItem('bach_voter_name');
  if (savedName) voterName = savedName;

  await loadVotes();

  if (!voterName) {
    document.getElementById('voterModal').classList.add('show');
  } else {
    updateVoterDisplays('Voting as: ' + voterName);
  }

  applyFiltersAndSort();
  initMap();

  // Poll for new votes every 10 seconds
  setInterval(async () => {
    await loadVotes();
    applyFiltersAndSort();
  }, 10000);
});

// ─── VOTER NAME ───
function setVoterName() {
  const input = document.getElementById('voterNameInput').value.trim();
  if (!input) return;
  voterName = input;
  localStorage.setItem('bach_voter_name', voterName);
  updateVoterDisplays('Voting as: ' + voterName);
  document.getElementById('voterModal').classList.remove('show');
  renderCards();
}

function changeVoter() {
  document.getElementById('voterNameInput').value = '';
  document.getElementById('voterModal').classList.add('show');
  document.getElementById('voterNameInput').focus();
}

function toggleMenu() {
  document.querySelector('.hamburger').classList.toggle('open');
  document.getElementById('menuDropdown').classList.toggle('show');
}

function updateVoterDisplays(text) {
  document.getElementById('voterDisplay').textContent = text;
  const m = document.getElementById('voterDisplayMobile');
  if (m) m.textContent = text;
}

// ─── VOTING (Ranked Choice 1-3) ───
const RANKS = [
  { label: '1st', key: '1' },
  { label: '2nd', key: '2' },
  { label: '3rd', key: '3' }
];

function castVote(listingId, rankKey) {
  if (!voterName) { document.getElementById('voterModal').classList.add('show'); return; }

  // If this listing already has this rank from this voter, toggle it off
  if (!votes[listingId]) votes[listingId] = {};
  if (votes[listingId][voterName] === rankKey) {
    delete votes[listingId][voterName];
    if (Object.keys(votes[listingId]).length === 0) delete votes[listingId];
    saveVotes();
    renderCards();
    return;
  }

  // Clear this rank from any other listing for this voter
  for (const lid of Object.keys(votes)) {
    if (votes[lid][voterName] === rankKey) {
      delete votes[lid][voterName];
      if (Object.keys(votes[lid]).length === 0) delete votes[lid];
    }
  }

  // Assign the rank to this listing
  if (!votes[listingId]) votes[listingId] = {};
  votes[listingId][voterName] = rankKey;
  saveVotes();
  renderCards();
}

// ─── RENDER CARDS ───
function toggleFilter(filter) {
  const btn = document.getElementById('filter-' + filter);
  if (activeFilters.has(filter)) {
    activeFilters.delete(filter);
    btn.classList.remove('active');
  } else {
    activeFilters.add(filter);
    btn.classList.add('active');
  }
  applyFiltersAndSort();
}

function sortListings(key) {
  currentSort = key;
  document.querySelectorAll('.sort-bar .sort-btn').forEach(b => {
    if (b.id.startsWith('sort-')) b.classList.remove('active');
  });
  document.getElementById('sort-' + key).classList.add('active');
  applyFiltersAndSort();
}

function applyFiltersAndSort() {
  let filtered = [...LISTINGS];

  // Sort by vote results (ranked choice score), then by listing score as tiebreaker
  filtered.sort((a, b) => {
    const aVoteScore = calcVoteScore(votes[a.id] || {});
    const bVoteScore = calcVoteScore(votes[b.id] || {});
    if (bVoteScore !== aVoteScore) return bVoteScore - aVoteScore;
    return b.score - a.score;
  });

  sortedListings = filtered;

  renderCards();
  updateMapMarkers();
}

function updateMapMarkers() {
  if (!map) return;
  const visibleIds = new Set(sortedListings.map(l => l.id));
  LISTINGS.forEach(l => {
    if (markers[l.id]) {
      if (visibleIds.has(l.id)) {
        if (!map.hasLayer(markers[l.id])) markers[l.id].addTo(map);
      } else {
        map.removeLayer(markers[l.id]);
      }
    }
  });
  // Fit bounds to visible markers
  const visible = sortedListings.map(l => markers[l.id]).filter(Boolean);
  if (visible.length > 0) {
    const group = L.featureGroup(visible);
    map.fitBounds(group.getBounds().pad(0.15));
  }
}

function cardHtml(l, prefix) {
  prefix = prefix || '';
  const ppn = Math.round(l.price / 7 / 3);
  const listingVotes = votes[l.id] || {};
  const myVote = voterName ? listingVotes[voterName] : null;
  const rankVoters = Object.entries(listingVotes).map(([name, rank]) => {
    const label = rank === '1' ? '1st' : rank === '2' ? '2nd' : '3rd';
    return label + ': ' + name;
  }).join(' \u2022 ');
  const photos = l.photos || [];
  const ratingStr = l.rating ? `\u2605 ${l.rating} (${l.reviews} reviews)` : 'New listing';
  const hasWater = l.hasPool || l.hasHotTub;
  const carouselId = prefix + 'carousel-' + l.id;
  const counterId = prefix + 'counter-' + l.id;
  const layoutBits = [
    `${l.bedrooms}BR`,
    l.beds ? `${l.beds} bed${l.beds === 1 ? '' : 's'}` : null,
    `${l.baths} ba`,
    `${l.guests} guests`,
  ].filter(Boolean).join(' \u2022 ');

  return `
  <div class="card ${hasWater ? 'has-water-feature' : ''}" id="${prefix}card-${l.id}">
    ${photos.length > 0 ? `
    <div class="carousel" id="${carouselId}" onclick="event.stopPropagation()">
      ${photos.map((p, idx) => `<img src="${p}" alt="${l.name}" class="${idx === 0 ? 'active' : ''}" loading="lazy">`).join('')}
      ${photos.length > 1 ? `
        <button class="carousel-btn prev" onclick="slideCarousel('${carouselId}', -1)">\u2039</button>
        <button class="carousel-btn next" onclick="slideCarousel('${carouselId}', 1)">\u203A</button>
        <div class="carousel-counter"><span id="${counterId}">1</span>/${photos.length}</div>
        <div class="carousel-dots">
          ${photos.map((_, idx) => `<button class="carousel-dot ${idx === 0 ? 'active' : ''}" onclick="goToSlide('${carouselId}', ${idx})"></button>`).join('')}
        </div>
      ` : ''}
    </div>` : ''}
    <div class="card-body" onclick="flyTo(${l.lat}, ${l.lng}, '${l.id}')">
      <div class="card-name"><span class="card-rank">${l.rank}</span>${l.name}</div>
      ${(hasWater || l.hasParking) ? `<div class="amenity-badges">
        ${l.hasPool ? '<span class="amenity-badge">\u{1F3CA} Pool</span>' : ''}
        ${l.hasHotTub ? '<span class="amenity-badge hot-tub">\u2668\uFE0F Hot Tub</span>' : ''}
        ${l.hasParking ? '<span class="amenity-badge parking">\u{1F17F}\uFE0F Free Parking</span>' : ''}
      </div>` : ''}
      <div class="card-details">
        <div><span class="label">Layout</span><br>${layoutBits}</div>
        <div><span class="label">Rating</span><br>${ratingStr}</div>
        <div><span class="label">Total</span><br><span class="card-price">$${l.price.toLocaleString()}</span></div>
        <div><span class="label">Per Person</span><br><span class="card-price">$${Math.round(l.price / 7).toLocaleString()}</span> <small>($${ppn}/night)</small></div>
      </div>
      <div class="card-highlight">${l.highlight}</div>
      <div class="card-actions">
        <button class="action-icon-btn" onclick="event.stopPropagation(); openGallery('${l.id}')" title="Photos">\u{1F4F7}</button>
        <button class="action-icon-btn" onclick="event.stopPropagation(); openInfo('${l.id}')" title="Details">\u{1F4CB}</button>
        <a class="action-icon-btn" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Open on Airbnb" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">\u{1F517}</a>
        <div class="action-divider"></div>
        <div class="vote-btns">
          ${RANKS.map(r => `
            <button class="vote-btn ${myVote === r.key ? 'selected' : ''}"
                    onclick="event.stopPropagation(); castVote('${l.id}', '${r.key}')"
                    title="${r.label} choice">${r.key}</button>
          `).join('')}
        </div>
      </div>
      ${rankVoters ? '<div class="rank-voters">' + rankVoters + '</div>' : ''}
    </div>
  </div>`;
}

function renderCards() {
  const container = document.getElementById('cardList');
  container.innerHTML = sortedListings.map(l => cardHtml(l, '')).join('');
}

// ─── CAROUSEL ───
function slideCarousel(carouselId, direction) {
  const carousel = document.getElementById(carouselId);
  if (!carousel) return;
  const imgs = carousel.querySelectorAll('img');
  const dots = carousel.querySelectorAll('.carousel-dot');
  let current = [...imgs].findIndex(img => img.classList.contains('active'));
  imgs[current].classList.remove('active');
  if (dots[current]) dots[current].classList.remove('active');
  current = (current + direction + imgs.length) % imgs.length;
  imgs[current].classList.add('active');
  if (dots[current]) dots[current].classList.add('active');
  const counter = document.getElementById(carouselId.replace('carousel-', 'counter-'));
  if (counter) counter.textContent = current + 1;
}

function goToSlide(carouselId, index) {
  const carousel = document.getElementById(carouselId);
  if (!carousel) return;
  const imgs = carousel.querySelectorAll('img');
  const dots = carousel.querySelectorAll('.carousel-dot');
  imgs.forEach((img, i) => img.classList.toggle('active', i === index));
  dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
  const counter = document.getElementById(carouselId.replace('carousel-', 'counter-'));
  if (counter) counter.textContent = index + 1;
}

// ─── MAP ───
let map, markers = {};

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([32.7855, -79.9390], 15);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 19
  }).addTo(map);

  // Gold star for Upper King
  const starIcon = L.divIcon({
    className: 'star-marker',
    html: '<div style="font-size:28px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));">\u2B50</div>',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
  L.marker([UPPER_KING.lat, UPPER_KING.lng], { icon: starIcon })
    .addTo(map)
    .bindPopup('<b style="font-family:Playfair Display,serif;">Upper King Street</b><br><em>Bar & nightlife district</em>');

  // Listing markers
  LISTINGS.forEach(l => {
    const color = l.fav ? '#FF6B8A' : '#5B8DD9';
    const icon = L.divIcon({
      className: 'listing-marker',
      html: `<div style="
        background:${color};
        color:white;
        font-weight:700;
        font-size:12px;
        width:26px;
        height:26px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        border:2px solid white;
        box-shadow:0 2px 6px rgba(0,0,0,0.3);
        font-family:Montserrat,sans-serif;
      ">${l.rank}</div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 13]
    });

    const ppn = Math.round(l.price / 7 / 3);
    const photos = l.photos || [];
    const popupId = 'popup-' + l.id;
    const ratingStr = l.rating ? `\u2605${l.rating}` : 'New';
    const marker = L.marker([l.lat, l.lng], { icon })
      .addTo(map)
      .bindPopup(cardHtml(l, 'popup-'), { maxWidth: 420, className: 'card-popup' });
    markers[l.id] = marker;
  });

  // Fit bounds
  const group = L.featureGroup(Object.values(markers));
  map.fitBounds(group.getBounds().pad(0.15));
}

function flyTo(lat, lng, id) {
  map.flyTo([lat, lng], 17, { duration: 0.8 });
  markers[id].openPopup();
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + id).classList.add('active');
}

// ─── RESULTS ───
function showResults() {
  const body = document.getElementById('resultsBody');
  const sorted = [...LISTINGS].sort((a, b) => {
    const aVotes = votes[a.id] || {};
    const bVotes = votes[b.id] || {};
    const aScore = calcVoteScore(aVotes);
    const bScore = calcVoteScore(bVotes);
    return bScore - aScore;
  });

  // Count total unique voters
  const allVoters = new Set();
  LISTINGS.forEach(l => {
    const v = votes[l.id] || {};
    Object.keys(v).forEach(name => allVoters.add(name));
  });
  const voterCount = allVoters.size;
  document.getElementById('resultsSummary').innerHTML = voterCount > 0
    ? `<strong>${voterCount}</strong> ${voterCount === 1 ? 'person has' : 'people have'} voted`
    : 'No votes yet \u2014 be the first to rank your favorites!';

  body.innerHTML = sorted.map((l, i) => {
    const v = votes[l.id] || {};
    const score = calcVoteScore(v);
    const voterEntries = Object.entries(v).sort((a, b) => a[1].localeCompare(b[1]));

    const chips = voterEntries.map(([name, rank]) =>
      `<span class="voter-chip"><span class="voter-rank r${rank}">${rank}</span>${name}</span>`
    ).join('');

    return `
      <div class="result-card ${i === 0 && score > 0 ? 'leader' : ''}">
        <div class="result-header">
          <div class="result-position p${i + 1}">${i + 1}</div>
          <div class="result-listing-name">${l.name}</div>
          <div class="result-score">${score} <small>pts</small></div>
        </div>
        ${voterEntries.length > 0
          ? '<div class="result-voters">' + chips + '</div>'
          : '<div class="result-no-votes">No votes yet</div>'
        }
      </div>`;
  }).join('');

  document.getElementById('resultsOverlay').classList.add('show');
}

function closeResults() {
  document.getElementById('resultsOverlay').classList.remove('show');
}

function calcVoteScore(voteObj) {
  const weights = { '1': 3, '2': 2, '3': 1 };
  let total = 0;
  Object.values(voteObj).forEach(v => {
    if (weights[v] !== undefined) total += weights[v];
  });
  return total;
}

// ─── INFO MODAL ───
function openInfo(listingId) {
  const l = LISTINGS.find(x => x.id === listingId);
  if (!l) return;
  const info = LISTING_INFO[listingId] || {};
  const ppn = Math.round(l.price / 7 / 3);

  document.getElementById('infoTitle').textContent = l.name;
  document.getElementById('infoSubtitle').textContent =
    l.bedrooms + ' bedrooms \u2022 ' + l.baths + ' baths \u2022 sleeps ' + l.guests;
  document.getElementById('infoDesc').textContent = info.description || '';

  let html = '';

  if (info.vibe) {
    html += '<div style="background:var(--gold-light);padding:8px 12px;border-radius:8px;font-size:0.85rem;font-weight:500;color:var(--gold-dark);margin-bottom:12px;">' + info.vibe + '</div>';
  }

  const details = [];
  details.push({ icon: '\u{1F4B0}', text: '$' + l.price.toLocaleString() + ' total \u2022 $' + Math.round(l.price / 7) + '/person \u2022 $' + ppn + '/pp/night' });
  if (l.rating) details.push({ icon: '\u2B50', text: l.rating + ' stars (' + l.reviews + ' reviews)' });
  if (info.sleeping) details.push({ icon: '\u{1F6CF}\uFE0F', text: info.sleeping });
  details.push({ icon: '\u{1F552}', text: 'Check-in ' + (info.checkin || '4:00 PM') + ' \u2022 Checkout ' + (info.checkout || '10:00 AM') });
  if (info.host) details.push({ icon: '\u{1F3E0}', text: 'Hosted by ' + info.host + (info.superhost ? ' \u2022 Superhost' : '') });
  if (info.neighborhood) details.push({ icon: '\u{1F4CD}', text: info.neighborhood });

  html += details.map(d =>
    '<div class="info-detail"><span class="info-detail-icon">' + d.icon + '</span><span>' + d.text + '</span></div>'
  ).join('');

  if (info.amenities && info.amenities.length > 0) {
    html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--blush);">';
    html += '<div style="font-weight:600;font-size:0.85rem;margin-bottom:8px;">Top amenities</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    html += info.amenities.map(a =>
      '<span style="background:white;border:1px solid var(--blush);border-radius:16px;padding:4px 10px;font-size:0.75rem;">' + a + '</span>'
    ).join('');
    html += '</div></div>';
  }

  document.getElementById('infoDetails').innerHTML = html;
  document.getElementById('infoOverlay').classList.add('show');
}

function closeInfo() {
  document.getElementById('infoOverlay').classList.remove('show');
}

// ─── PHOTO GALLERY MODAL ───
let galleryPhotos = [];
let galleryIndex = 0;

function openGallery(listingId) {
  const l = LISTINGS.find(x => x.id === listingId);
  if (!l) return;
  galleryPhotos = ALL_PHOTOS[listingId] || l.photos || [];
  galleryIndex = 0;

  const overlay = document.getElementById('galleryOverlay');
  const img = document.getElementById('galleryImg');
  const counter = document.getElementById('galleryCounter');
  const title = document.getElementById('galleryTitle');

  title.textContent = l.name;
  img.src = galleryPhotos[0];
  counter.textContent = `1 / ${galleryPhotos.length}`;
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeGallery() {
  document.getElementById('galleryOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function galleryNav(dir) {
  galleryIndex = (galleryIndex + dir + galleryPhotos.length) % galleryPhotos.length;
  const img = document.getElementById('galleryImg');
  img.style.opacity = '0';
  setTimeout(() => {
    img.src = galleryPhotos[galleryIndex];
    img.style.opacity = '1';
  }, 150);
  document.getElementById('galleryCounter').textContent = `${galleryIndex + 1} / ${galleryPhotos.length}`;
}

// Close modals on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('resultsOverlay').classList.remove('show');
    closeGallery();
    closeInfo();
  }
  if (document.getElementById('galleryOverlay').classList.contains('show')) {
    if (e.key === 'ArrowLeft') galleryNav(-1);
    if (e.key === 'ArrowRight') galleryNav(1);
  }
});
</script>

    <button class="info-close" onclick="closeInfo()">&times;</button>

    <div class="info-subtitle" id="infoSubtitle"></div>
    <div class="info-desc" id="infoDesc"></div>
    <div id="infoDetails"></div>
  </div>
</div>

<!-- Photo Gallery Modal -->
<div class="gallery-overlay" id="galleryOverlay">
  <div class="gallery-header">
    <span class="gallery-title" id="galleryTitle"></span>
    <button class="gallery-close" onclick="closeGallery()">&times;</button>
  </div>
  <div class="gallery-body" onclick="closeGallery()">
    <button class="gallery-nav prev" onclick="event.stopPropagation(); galleryNav(-1)">&lsaquo;</button>
    <img id="galleryImg" class="gallery-img" onclick="event.stopPropagation()" src="" alt="">
    <button class="gallery-nav next" onclick="event.stopPropagation(); galleryNav(1)">&rsaquo;</button>
  </div>
  <div class="gallery-counter" id="galleryCounter"></div>
</div>
