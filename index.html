<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Megan's Charleston Bachelorette</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap');

:root {
  --blush: #F2D1D1;
  --blush-light: #FDF0F0;
  --blush-dark: #E8A5A5;
  --gold: #D4A843;
  --gold-light: #F0DBA8;
  --gold-dark: #B8922F;
  --charcoal: #2D2D2D;
  --white: #FFFFFF;
  --cream: #FFF9F5;
  --sage: #B5C4B1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--cream);
  color: var(--charcoal);
  overflow: hidden;
  height: 100vh;
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, var(--blush) 0%, var(--blush-light) 50%, var(--gold-light) 100%);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--gold);
  z-index: 1000;
  position: relative;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--charcoal);
  letter-spacing: 1px;
}
.header h1 span { color: var(--gold-dark); }
.header-actions { display: flex; gap: 10px; align-items: center; }
.header-btn {
  background: var(--gold);
  color: var(--white);
  border: none;
  padding: 8px 16px;
  border-radius: 20px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.header-btn:hover { background: var(--gold-dark); transform: translateY(-1px); }
.header-btn.outline {
  background: transparent;
  border: 2px solid var(--gold);
  color: var(--gold-dark);
}
.header-btn.outline:hover { background: var(--gold); color: var(--white); }

/* ─── MAIN LAYOUT ─── */
.main {
  display: flex;
  height: calc(100vh - 58px);
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: 420px;
  min-width: 420px;
  overflow-y: auto;
  background: var(--cream);
  border-right: 1px solid var(--blush);
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--blush-dark) transparent;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--blush-dark); border-radius: 3px; }

.sidebar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--gold-dark);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--gold-light);
}

/* ─── SORT BAR ─── */
.sort-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.sort-label {
  font-size: 0.7rem;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 2px;
}
.sort-btn {
  background: var(--blush-light);
  border: 1px solid var(--blush);
  color: var(--charcoal);
  padding: 4px 10px;
  border-radius: 14px;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.sort-btn:hover { background: var(--blush); }
.sort-btn.active {
  background: var(--gold);
  color: var(--white);
  border-color: var(--gold);
}

/* ─── POOL/HOT TUB BADGE ─── */
.amenity-badges { display: flex; gap: 6px; margin: 6px 0 4px 40px; flex-wrap: wrap; }
.amenity-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: linear-gradient(135deg, #E0F2FE, #BAE6FD);
  color: #0369A1;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid #7DD3FC;
}
.amenity-badge.hot-tub {
  background: linear-gradient(135deg, #FEF3C7, #FDE68A);
  color: #92400E;
  border-color: #FCD34D;
}
.amenity-badge.parking {
  background: linear-gradient(135deg, #ECFDF5, #A7F3D0);
  color: #065F46;
  border-color: #6EE7B7;
}
.card.has-water-feature {
  border-left: 3px solid #38BDF8;
}

/* ─── LISTING CARD ─── */
.card {
  background: var(--white);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border: 1px solid var(--blush);
  transition: all 0.25s;
  cursor: pointer;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,168,67,0.15); border-color: var(--gold-light); }
.card.active { border: 2px solid var(--gold); box-shadow: 0 6px 20px rgba(212,168,67,0.25); }

.card-rank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  background: var(--gold);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  border-radius: 50%;
  flex-shrink: 0;
}
.card-body { padding: 12px; }
.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--charcoal);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-score-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--white);
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 40px;
  margin-bottom: 8px;
}
.card-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
  font-size: 0.78rem;
  color: #666;
  margin-bottom: 8px;
  clear: both;
}
.card-details .label { color: #999; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
.card-highlight {
  font-size: 0.75rem;
  color: var(--gold-dark);
  font-weight: 500;
  font-style: italic;
  margin-bottom: 8px;
}
.card-price {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--charcoal);
}
.card-price small { font-weight: 400; color: #999; font-size: 0.75rem; }
.card-link {
  display: inline-block;
  margin-top: 6px;
  font-size: 0.75rem;
  color: var(--gold-dark);
  text-decoration: none;
  font-weight: 600;
}
.card-link:hover { text-decoration: underline; }

/* ─── PHOTO CAROUSEL ─── */
.carousel {
  position: relative;
  width: 100%;
  height: 180px;
  overflow: hidden;
  border-radius: 12px 12px 0 0;
  background: var(--blush-light);
}
.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.carousel img.active { display: block; }
.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.85);
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  transition: all 0.2s;
  z-index: 2;
}
.carousel-btn:hover { background: white; transform: translateY(-50%) scale(1.1); }
.carousel-btn.prev { left: 6px; }
.carousel-btn.next { right: 6px; }
.carousel-dots {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  z-index: 2;
}
.carousel-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  border: none;
  padding: 0;
  cursor: pointer;
  transition: background 0.2s;
}
.carousel-dot.active { background: white; }
.carousel-counter {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 0.65rem;
  padding: 2px 7px;
  border-radius: 10px;
  z-index: 2;
}

/* Popup carousel */
.popup-carousel {
  position: relative;
  width: 220px;
  height: 140px;
  overflow: hidden;
  border-radius: 8px;
  margin-bottom: 8px;
}
.popup-carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.popup-carousel img.active { display: block; }
.popup-carousel .carousel-btn { width: 22px; height: 22px; font-size: 11px; }

/* Score bars */
.score-bars { margin: 8px 0; }
.score-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 0.7rem; }
.score-bar-label { width: 65px; color: #999; text-transform: uppercase; letter-spacing: 0.3px; }
.score-bar-track { flex: 1; height: 6px; background: var(--blush-light); border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.score-bar-fill.location { background: linear-gradient(90deg, var(--sage), #8BA888); }
.score-bar-fill.value { background: linear-gradient(90deg, var(--gold-light), var(--gold)); }
.score-bar-fill.bach { background: linear-gradient(90deg, var(--blush), var(--blush-dark)); }

/* ─── VOTING ─── */
.vote-section { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--blush); }
.vote-label { font-size: 0.7rem; color: #999; margin-bottom: 4px; }
.vote-btns { display: flex; gap: 6px; }
.vote-btn {
  font-size: 0.8rem;
  font-weight: 700;
  font-family: 'Montserrat', sans-serif;
  width: 32px; height: 32px;
  border: 2px solid var(--blush-dark);
  border-radius: 50%;
  cursor: pointer;
  background: var(--blush-light);
  color: var(--charcoal);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.vote-btn:hover { transform: scale(1.15); border-color: var(--gold); }
.vote-btn.selected { border-color: var(--gold); background: var(--gold); color: white; transform: scale(1.15); }
.rank-voters { font-size: 0.7rem; color: #999; margin-top: 2px; }

/* ─── MAP ─── */
.map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* ─── VOTER MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--white);
  border-radius: 16px;
  padding: 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h2 {
  font-family: 'Playfair Display', serif;
  color: var(--charcoal);
  margin-bottom: 8px;
}
.modal p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
.modal input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--blush);
  border-radius: 10px;
  font-family: 'Montserrat', sans-serif;
  font-size: 1rem;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.modal input:focus { border-color: var(--gold); }
.modal button {
  margin-top: 16px;
  background: var(--gold);
  color: var(--white);
  border: none;
  padding: 12px 32px;
  border-radius: 24px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  letter-spacing: 0.5px;
}
.modal button:hover { background: var(--gold-dark); }

/* ─── RESULTS OVERLAY ─── */
.results-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.results-overlay.show { display: flex; }
.results-panel {
  background: var(--white);
  border-radius: 16px;
  padding: 32px;
  max-width: 700px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.results-panel h2 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  margin-bottom: 20px;
  color: var(--charcoal);
}
.results-close {
  position: absolute;
  top: 20px; right: 30px;
  font-size: 2rem;
  color: var(--white);
  cursor: pointer;
  background: none;
  border: none;
}
.result-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--blush-light);
}
.result-rank { font-weight: 700; color: var(--gold-dark); width: 30px; text-align: center; }
.result-name { flex: 1; font-weight: 500; }
.result-bar-wrap { width: 200px; }
.result-bar { height: 20px; border-radius: 10px; display: flex; overflow: hidden; background: var(--blush-light); }
.result-bar div { height: 100%; transition: width 0.5s; }
.result-bar .love { background: #FF6B8A; } /* 1st choice */
.result-bar .like { background: var(--gold); } /* 2nd choice */
.result-bar .meh { background: #CCC; } /* 3rd choice */
.result-votes { width: 60px; text-align: right; font-size: 0.8rem; color: #999; }
.legend { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; font-size: 0.8rem; }
.legend span { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

/* ─── HAMBURGER MENU ─── */
.hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 1002;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--charcoal);
  margin: 5px 0;
  border-radius: 2px;
  transition: all 0.3s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
.menu-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  right: 12px;
  background: var(--white);
  border: 1px solid var(--blush);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  padding: 8px;
  z-index: 1001;
  flex-direction: column;
  gap: 4px;
  min-width: 160px;
}
.menu-dropdown.show { display: flex; }
.menu-dropdown .header-btn { width: 100%; text-align: center; }
.menu-dropdown .menu-info { font-size: 0.75rem; color: var(--gold-dark); font-weight: 600; padding: 6px 8px; text-align: center; }

/* ─── MOBILE ─── */
@media (max-width: 768px) {
  .hamburger { display: block; }
  .header-actions { display: none; }
  .header { padding: 10px 16px; }
  .header h1 { font-size: 1.1rem; }
  .main { flex-direction: column; }
  body { overflow: auto; height: auto; }
  .sidebar { width: 100%; min-width: unset; order: 2; max-height: none; overflow-y: visible; }
  .map-container { height: 35vh; min-height: 200px; order: 1; }
  .card-details { grid-template-columns: 1fr 1fr; }
  .sort-bar { gap: 4px; }
  .sort-btn { padding: 4px 8px; font-size: 0.65rem; }
}

/* ─── PHOTO GALLERY MODAL ─── */
.gallery-overlay {
  display: none; position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,0.95); flex-direction: column;
}
.gallery-overlay.show { display: flex; }
.gallery-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; background: rgba(0,0,0,0.5);
}
.gallery-title {
  font-family: 'Playfair Display', serif; color: white;
  font-size: 1.1rem; flex: 1;
}
.gallery-airbnb-link {
  color: var(--gold); font-size: 0.85rem; font-weight: 600;
  text-decoration: none; white-space: nowrap;
}
.gallery-airbnb-link:hover { text-decoration: underline; }
.gallery-close {
  background: none; border: none; color: white;
  font-size: 2rem; cursor: pointer; padding: 0 8px; line-height: 1;
}
.gallery-close:hover { color: var(--gold); }
.gallery-body {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; padding: 10px;
}
.gallery-img {
  max-width: 90%; max-height: 80vh; object-fit: contain;
  border-radius: 8px; transition: opacity 0.15s ease;
}
.gallery-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.15); border: none; color: white;
  font-size: 2.5rem; width: 50px; height: 70px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.gallery-nav:hover { background: rgba(255,255,255,0.3); }
.gallery-nav.prev { left: 16px; }
.gallery-nav.next { right: 16px; }
.gallery-counter {
  text-align: center; color: rgba(255,255,255,0.7);
  font-size: 0.85rem; padding: 8px; font-weight: 500;
}
.card-gallery-btn {
  display: inline-block; background: var(--gold); color: white;
  padding: 8px 16px; border-radius: 20px; font-weight: 600;
  font-size: 0.8rem; cursor: pointer; border: none;
  font-family: 'Montserrat', sans-serif; letter-spacing: 0.3px;
  transition: all 0.2s; margin-top: 4px;
}
.card-gallery-btn:hover { background: var(--gold-dark); transform: translateY(-1px); }
</style>
</head>
<body>

<div class="header">
  <h1>Megan's <span>Charleston</span> Bachelorette</h1>
  <div class="header-actions">
    <a href="activities.html" class="header-btn outline" style="text-decoration:none;">View Activities</a>
    <span id="voterDisplay" style="font-size:0.8rem; color:var(--gold-dark); font-weight:600;"></span>
    <button class="header-btn outline" onclick="changeVoter()">Change Name</button>
    <button class="header-btn" onclick="showResults()">View Results</button>
    <button class="header-btn outline" onclick="copyShareLink()">Share Link</button>
    <span id="syncStatus" style="font-size:0.7rem; color:var(--sage); font-weight:500;"></span>
  </div>
  <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
  <div class="menu-dropdown" id="menuDropdown">
    <div class="menu-info" id="voterDisplayMobile"></div>
    <a href="activities.html" class="header-btn outline" style="text-decoration:none;">View Activities</a>
    <button class="header-btn" onclick="showResults(); toggleMenu();">View Results</button>
    <button class="header-btn outline" onclick="changeVoter(); toggleMenu();">Change Name</button>
    <button class="header-btn outline" onclick="copyShareLink(); toggleMenu();">Share Link</button>
    <div class="menu-info" id="syncStatusMobile"></div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sort-bar">
      <span class="sort-label">Sort by:</span>
      <button class="sort-btn active" onclick="sortListings('score')" id="sort-score">Score</button>
      <button class="sort-btn" onclick="sortListings('loc')" id="sort-loc">Location</button>
      <button class="sort-btn" onclick="sortListings('val')" id="sort-val">Value</button>
      <button class="sort-btn" onclick="sortListings('bach')" id="sort-bach">Bach Fit</button>
      <button class="sort-btn" onclick="sortListings('price')" id="sort-price">Price</button>
      <span class="sort-label" style="margin-left:8px;">Filter:</span>
      <button class="sort-btn" onclick="toggleFilter('pool')" id="filter-pool">Pool</button>
      <button class="sort-btn" onclick="toggleFilter('parking')" id="filter-parking">Free Parking</button>
    </div>
    <div id="cardList"></div>
  </div>
  <div class="map-container">
    <div id="map"></div>
  </div>
</div>

<!-- Voter Name Modal -->
<div class="modal-overlay" id="voterModal">
  <div class="modal">
    <h2>Hey girl!</h2>
    <p>Enter your name to start voting on Megan's bachelorette stays</p>
    <input type="text" id="voterNameInput" placeholder="Your name" autocomplete="off" />
    <br>
    <button onclick="setVoterName()">Let's Go!</button>
  </div>
</div>

<!-- Results Overlay -->
<div class="results-overlay" id="resultsOverlay">
  <button class="results-close" onclick="closeResults()">&times;</button>
  <div class="results-panel">
    <h2>Vote Results</h2>
    <div class="legend">
      <span><span class="legend-dot" style="background:#FF6B8A"></span> Love it</span>
      <span><span class="legend-dot" style="background:var(--gold)"></span> Like it</span>
      <span><span class="legend-dot" style="background:#CCC"></span> Meh</span>
      <span><span class="legend-dot" style="background:#999"></span> Nah</span>
    </div>
    <div id="resultsBody"></div>
  </div>
</div>

<script>
// ─── LISTING DATA (Chelsea’s 6 picks + 14 closest to King St) ───
const LISTINGS = [
    {
        "rank": 1,
        "name": "6-Bedroom Home with Pool, Walk to Dining & Sights!",
        "id": "1067027116202514008",
        "score": 5.73,
        "loc": 4.5,

// ─── VOTES API (Vercel serverless function) ───
const VOTES_API = 'https://bach-votes.vercel.app/api/votes';

async function loadVotes() {
  const dot = document.getElementById('syncStatus');
  try {
    const res = await fetch(VOTES_API);
    if (res.ok) {
      votes = await res.json();
      dot.innerHTML = '&#x1f7e2; Synced';
    }
  } catch(e) {
    console.warn('Failed to load votes', e);
    dot.innerHTML = '&#x1f534; Offline';
    const saved = localStorage.getItem('bach_votes');
    if (saved) try { votes = JSON.parse(saved); } catch(e) {}
  }
}

async function saveVotes() {
  localStorage.setItem('bach_votes', JSON.stringify(votes));

  if (isSaving) { pendingSave = true; return; }
  isSaving = true;
  const dot = document.getElementById('syncStatus');
  dot.innerHTML = '&#x1f7e1; Saving...';

  try {
    const res = await fetch(VOTES_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(votes)
    });
    if (res.ok) {
      dot.innerHTML = '&#x1f7e2; Synced';
    } else {
      dot.innerHTML = '&#x1f534; Save failed';
    }
  } catch(e) {
    console.warn('Failed to save votes', e);
    dot.innerHTML = '&#x1f534; Offline';
  }
  isSaving = false;
  if (pendingSave) { pendingSave = false; saveVotes(); }
}

window.addEventListener('DOMContentLoaded', async () => {

    document.getElementById('voterModal').classList.add('show');

});

// ─── VOTING (Ranked Choice 1-3) ───
const RANKS = [
  { label: '1st', key: '1' },
  { label: '2nd', key: '2' },
  { label: '3rd', key: '3' }
];

function castVote(listingId, rankKey) {
  if (!voterName) { document.getElementById('voterModal').classList.add('show'); return; }

  // If this listing already has this rank from this voter, toggle it off
  if (!votes[listingId]) votes[listingId] = {};
  if (votes[listingId][voterName] === rankKey) {
    delete votes[listingId][voterName];
    if (Object.keys(votes[listingId]).length === 0) delete votes[listingId];
    saveVotes();
    renderCards();
    return;
  }

  // Clear this rank from any other listing for this voter
  for (const lid of Object.keys(votes)) {
    if (votes[lid][voterName] === rankKey) {
      delete votes[lid][voterName];
      if (Object.keys(votes[lid]).length === 0) delete votes[lid];
    }
  }

  // Assign the rank to this listing
  if (!votes[listingId]) votes[listingId] = {};
  votes[listingId][voterName] = rankKey;
  saveVotes();
  renderCards();
}

// ─── RENDER CARDS ───
function toggleFilter(filter) {
  const btn = document.getElementById('filter-' + filter);
  if (activeFilters.has(filter)) {
    activeFilters.delete(filter);
    btn.classList.remove('active');
  } else {
    activeFilters.add(filter);
    btn.classList.add('active');
  }
  applyFiltersAndSort();
}

function sortListings(key) {
  currentSort = key;
  document.querySelectorAll('.sort-bar .sort-btn').forEach(b => {
    if (b.id.startsWith('sort-')) b.classList.remove('active');
  });
  document.getElementById('sort-' + key).classList.add('active');
  applyFiltersAndSort();
}

function applyFiltersAndSort() {
  let filtered = [...LISTINGS];

  // Apply filters
  if (activeFilters.has('pool')) {
    filtered = filtered.filter(l => l.hasPool);
  }
  if (activeFilters.has('parking')) {
    filtered = filtered.filter(l => l.hasParking);
  }

  // Apply sort
  filtered.sort((a, b) => {
    if (currentSort === 'price') return a.price - b.price;
    if (currentSort === 'loc') return b.loc - a.loc || b.score - a.score;
    if (currentSort === 'val') return b.val - a.val || b.score - a.score;
    if (currentSort === 'bach') return b.bach - a.bach || b.score - a.score;
    return b.score - a.score;
  });

  sortedListings = filtered;

  renderCards();
  updateMapMarkers();
}

function updateMapMarkers() {
  if (!map) return;
  const visibleIds = new Set(sortedListings.map(l => l.id));
  LISTINGS.forEach(l => {
    if (markers[l.id]) {
      if (visibleIds.has(l.id)) {
        if (!map.hasLayer(markers[l.id])) markers[l.id].addTo(map);
      } else {
        map.removeLayer(markers[l.id]);
      }
    }
  });
  // Fit bounds to visible markers
  const visible = sortedListings.map(l => markers[l.id]).filter(Boolean);
  if (visible.length > 0) {
    const group = L.featureGroup(visible);
    map.fitBounds(group.getBounds().pad(0.15));
  }
}

function renderCards() {
  const container = document.getElementById('cardList');
  container.innerHTML = sortedListings.map(l => {
    const ppn = Math.round(l.price / 10 / 3);
    const listingVotes = votes[l.id] || {};
    const myVote = voterName ? listingVotes[voterName] : null;

    const rankVoters = Object.entries(listingVotes).map(([name, rank]) => {
      const label = rank === '1' ? '1st' : rank === '2' ? '2nd' : '3rd';
      return label + ': ' + name;
    }).join(' \u2022 ');
    const photos = l.photos || [];
    const ratingStr = l.rating ? `\u2605 ${l.rating} (${l.reviews} reviews)` : 'New listing';
    const displayRank = l.rank;

    const hasWater = l.hasPool || l.hasHotTub;

    return `
    <div class="card ${hasWater ? 'has-water-feature' : ''}" id="card-${l.id}">
      ${photos.length > 0 ? `
      <div class="carousel" id="carousel-${l.id}" onclick="event.stopPropagation()">
        ${photos.map((p, idx) => `<img src="${p}" alt="${l.name}" class="${idx === 0 ? 'active' : ''}" loading="lazy">`).join('')}
        ${photos.length > 1 ? `
          <button class="carousel-btn prev" onclick="slideCarousel('${l.id}', -1)">\u2039</button>
          <button class="carousel-btn next" onclick="slideCarousel('${l.id}', 1)">\u203A</button>
          <div class="carousel-counter"><span id="counter-${l.id}">1</span>/${photos.length}</div>
          <div class="carousel-dots">
            ${photos.map((_, idx) => `<button class="carousel-dot ${idx === 0 ? 'active' : ''}" onclick="goToSlide('${l.id}', ${idx})"></button>`).join('')}
          </div>
        ` : ''}
      </div>` : ''}
      <div class="card-body" onclick="flyTo(${l.lat}, ${l.lng}, '${l.id}')">
        <div class="card-name"><span class="card-rank">${displayRank}</span>${l.name}</div>
        ${(hasWater || l.hasParking) ? `<div class="amenity-badges">
          ${l.hasPool ? '<span class="amenity-badge">\u{1F3CA} Pool</span>' : ''}
          ${l.hasHotTub ? '<span class="amenity-badge hot-tub">\u2668\uFE0F Hot Tub</span>' : ''}
          ${l.hasParking ? '<span class="amenity-badge parking">\u{1F17F}\uFE0F Free Parking</span>' : ''}
        </div>` : ''}
        <div class="card-score-badge">Score: ${l.score.toFixed(1)} / 10</div>
        <div class="score-bars">
          <div class="score-bar-row">
            <span class="score-bar-label">Location</span>
            <div class="score-bar-track"><div class="score-bar-fill location" style="width:${l.loc*10}%"></div></div>
          </div>
          <div class="score-bar-row">
            <span class="score-bar-label">Value</span>
            <div class="score-bar-track"><div class="score-bar-fill value" style="width:${l.val*10}%"></div></div>
          </div>
          <div class="score-bar-row">
            <span class="score-bar-label">Bach Fit</span>
            <div class="score-bar-track"><div class="score-bar-fill bach" style="width:${l.bach*10}%"></div></div>
          </div>
        </div>
        <div class="card-details">
          <div><span class="label">Layout</span><br>${l.bedrooms}BR \u2022 ${l.baths} ba \u2022 ${l.guests} guests</div>
          <div><span class="label">Rating</span><br>${ratingStr}</div>
          <div><span class="label">Total</span><br><span class="card-price">$${l.price.toLocaleString()}</span></div>
          <div><span class="label">Per Person</span><br><span class="card-price">$${Math.round(l.price / 10).toLocaleString()}</span> <small>($${ppn}/night)</small></div>
        </div>
        <div class="card-highlight">${l.highlight}</div>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <button class="card-gallery-btn" onclick="event.stopPropagation(); openGallery('${l.id}')">See the Space \u2192</button>

        </div>

          <div class="vote-btns">
            ${RANKS.map(r => `
              <button class="vote-btn ${myVote === r.key ? 'selected' : ''}"
                      onclick="event.stopPropagation(); castVote('${l.id}', '${r.key}')"
                      title="${r.label} choice">${r.key}</button>
            `).join('')}

          ${rankVoters ? '<div class="rank-voters">' + rankVoters + '</div>' : ''}

  }).join('');
}

// ─── CAROUSEL ───
function slideCarousel(listingId, direction, isPopup) {
  const carousel = document.getElementById(isPopup ? listingId : 'carousel-' + listingId);
  const imgs = carousel.querySelectorAll('img');
  const dots = carousel.querySelectorAll('.carousel-dot');
  let current = [...imgs].findIndex(img => img.classList.contains('active'));
  imgs[current].classList.remove('active');
  if (dots[current]) dots[current].classList.remove('active');
  current = (current + direction + imgs.length) % imgs.length;
  imgs[current].classList.add('active');
  if (dots[current]) dots[current].classList.add('active');
  const counter = document.getElementById('counter-' + listingId);
  if (counter) counter.textContent = current + 1;
}

function goToSlide(listingId, index) {
  const carousel = document.getElementById('carousel-' + listingId);
  const imgs = carousel.querySelectorAll('img');
  const dots = carousel.querySelectorAll('.carousel-dot');
  imgs.forEach((img, i) => {
    img.classList.toggle('active', i === index);
  });
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === index);
  });
  const counter = document.getElementById('counter-' + listingId);
  if (counter) counter.textContent = index + 1;
}

// ─── MAP ───
let map, markers = {};

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([32.7855, -79.9390], 15);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 19
  }).addTo(map);

  // Gold star for Upper King
  const starIcon = L.divIcon({
    className: 'star-marker',
    html: '<div style="font-size:28px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));">\u2B50</div>',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
  L.marker([UPPER_KING.lat, UPPER_KING.lng], { icon: starIcon })
    .addTo(map)
    .bindPopup('<b style="font-family:Playfair Display,serif;">Upper King Street</b><br><em>Bar & nightlife district</em>');

  // Listing markers
  LISTINGS.forEach(l => {
    const color = l.fav ? '#FF6B8A' : '#5B8DD9';
    const icon = L.divIcon({
      className: 'listing-marker',
      html: `<div style="
        background:${color};
        color:white;
        font-weight:700;
        font-size:12px;
        width:26px;
        height:26px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        border:2px solid white;
        box-shadow:0 2px 6px rgba(0,0,0,0.3);
        font-family:Montserrat,sans-serif;
      ">${l.rank}</div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 13]
    });

    const ppn = Math.round(l.price / 10 / 3);
    const photos = l.photos || [];
    const popupId = 'popup-' + l.id;
    const ratingStr = l.rating ? `\u2605${l.rating}` : 'New';
    const marker = L.marker([l.lat, l.lng], { icon })
      .addTo(map)
      .bindPopup(`
        <div style="font-family:Montserrat,sans-serif; max-width:220px;">
          ${photos.length > 0 ? `
          <div class="popup-carousel" id="${popupId}">
            ${photos.map((p, idx) => `<img src="${p}" class="${idx === 0 ? 'active' : ''}">`).join('')}
            ${photos.length > 1 ? `
              <button class="carousel-btn prev" onclick="slideCarousel('${popupId}', -1, true)">\u2039</button>
              <button class="carousel-btn next" onclick="slideCarousel('${popupId}', 1, true)">\u203A</button>
            ` : ''}
          </div>` : ''}
          <b style="font-family:Playfair Display,serif; font-size:14px;">${l.name}</b><br>
          <span style="color:#D4A843; font-weight:600;">Score: ${l.score.toFixed(1)}</span><br>
          ${l.bedrooms}BR \u2022 ${l.baths}ba \u2022 ${ratingStr}<br>
          <b>$${l.price.toLocaleString()}</b> <span style="color:#999;">($${ppn}/pp/night)</span><br>
          <em style="color:#D4A843; font-size:12px;">${l.highlight}</em><br>
          <a href="${l.url}" target="_blank" style="color:#D4A843;">View on Airbnb</a>
        </div>
      `, { maxWidth: 240 });
    markers[l.id] = marker;
  });

  // Fit bounds
  const group = L.featureGroup(Object.values(markers));
  map.fitBounds(group.getBounds().pad(0.15));
}

function flyTo(lat, lng, id) {
  map.flyTo([lat, lng], 17, { duration: 0.8 });
  markers[id].openPopup();
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + id).classList.add('active');
}

// ─── RESULTS ───
function showResults() {
  const body = document.getElementById('resultsBody');
  const sorted = [...LISTINGS].sort((a, b) => {
    const aVotes = votes[a.id] || {};
    const bVotes = votes[b.id] || {};
    const aScore = calcVoteScore(aVotes);
    const bScore = calcVoteScore(bVotes);
    return bScore - aScore;
  });

  body.innerHTML = sorted.map((l, i) => {
    const v = votes[l.id] || {};
    const counts = { '1': 0, '2': 0, '3': 0 };
    Object.values(v).forEach(val => { if (counts[val] !== undefined) counts[val]++; });
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    const maxVoters = 10; // scale bar against reasonable max
    const pct = key => total > 0 ? (counts[key] / maxVoters * 100) : 0;
    const voters = Object.entries(v).map(([name, rank]) => {
      const label = rank === '1' ? '1st' : rank === '2' ? '2nd' : '3rd';
      return label + ': ' + name;
    }).join(', ');

    return `
      <div class="result-row">
        <div class="result-rank">${i + 1}</div>
        <div class="result-name">
          ${l.name}
          ${voters ? '<br><span style="font-size:0.75rem;color:#999;">' + voters + '</span>' : ''}
        </div>
        <div class="result-bar-wrap">
          <div class="result-bar">
            <div class="love" style="width:${pct('1')}%" title="1st choice"></div>
            <div class="like" style="width:${pct('2')}%" title="2nd choice"></div>
            <div class="meh" style="width:${pct('3')}%" title="3rd choice"></div>
          </div>
        </div>
        <div class="result-votes">${total} vote${total !== 1 ? 's' : ''}</div>
      </div>`;
  }).join('');

  document.getElementById('resultsOverlay').classList.add('show');
}

function closeResults() {
  document.getElementById('resultsOverlay').classList.remove('show');
}

function calcVoteScore(voteObj) {
  const weights = { '1': 3, '2': 2, '3': 1 };
  let total = 0;
  Object.values(voteObj).forEach(v => {
    if (weights[v] !== undefined) total += weights[v];
  });
  return total;
}

// ─── PHOTO GALLERY MODAL ───
let galleryPhotos = [];
let galleryIndex = 0;

function openGallery(listingId) {
  const l = LISTINGS.find(x => x.id === listingId);
  if (!l) return;
  galleryPhotos = ALL_PHOTOS[listingId] || l.photos || [];
  galleryIndex = 0;

  const overlay = document.getElementById('galleryOverlay');
  const img = document.getElementById('galleryImg');
  const counter = document.getElementById('galleryCounter');
  const title = document.getElementById('galleryTitle');
  const link = document.getElementById('galleryLink');

  title.textContent = l.name;
  link.href = l.url;
  img.src = galleryPhotos[0];
  counter.textContent = `1 / ${galleryPhotos.length}`;
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeGallery() {
  document.getElementById('galleryOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function galleryNav(dir) {
  galleryIndex = (galleryIndex + dir + galleryPhotos.length) % galleryPhotos.length;
  const img = document.getElementById('galleryImg');
  img.style.opacity = '0';
  setTimeout(() => {
    img.src = galleryPhotos[galleryIndex];
    img.style.opacity = '1';
  }, 150);
  document.getElementById('galleryCounter').textContent = `${galleryIndex + 1} / ${galleryPhotos.length}`;
}

// Close modals on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('resultsOverlay').classList.remove('show');
    closeGallery();
  }
  if (document.getElementById('galleryOverlay').classList.contains('show')) {
    if (e.key === 'ArrowLeft') galleryNav(-1);
    if (e.key === 'ArrowRight') galleryNav(1);
  }
});
